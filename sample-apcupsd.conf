# apcupsd.conf example
# ========= Basic Configuration Parameters ============
UPSNAME Smart-UPS RT 10000
# Device name.
UPSCABLE smart
# Possible values:
# simple, smart, ether, usb.
UPSTYPE snmp
DEVICE 1.2.3.4:161:APC:private
#POLLTIME 60
# Time interval for device polling. Default is 60 sec.
LOCKFILE /var/lock
# Directory for storing the process ID of the daemon.
SCRIPTDIR /etc/apcupsd
# The directory where the daemon's configuration and command files are stored.
PWRFAILDIR /etc/apcupsd
# Directory where the flag file is created on power failure.
NOLOGINDIR /etc
# The directory where the nologin file for blocking is created
# of log-ins.
#
# == Parameters used in case of power failure ==
ONBATTERYDELAY 6
# The time (in seconds) after which the system starts to
# react to a power failure.
# Note. Three parameters: BATTERYLEVEL, MINUTES
# and TIMEOUT – work in conjunction.
# The one that trips first will shut down the system.
BATTERYLEVEL 5
# The remaining battery charge (in percent) at which the battery will be
# shutting down the server.
MINUTES 3
# Remaining battery life (in minutes) at which
# will shut down the server.
TIMEOUT 0
# Battery runtime (in seconds) allowed for the UPS.
# If set to 0, # this timer is disabled.
ANNOY 300
# Time (in seconds) between alarm and shutdown.
ANNOYDELAY 60
# Delay after power failure before users
# sends a notification to exit
# out of the system.
NOLOGON disable
# A condition that determines at what point users
# it is forbidden to connect to the server during a power failure.
# Possible values: disable, timeout, percent, minutes, always.
KILLDELAY 0
# The time interval between shutting down the UPS and issuing the shutdown command.
# If the value is 0, the UPS shutdown command will not be issued
# is served.
#
# ==== Configuration parameters for NIS ====
NETSERVER on
# Variable enables or disables NIS startup.
NISIP 0.0.0.0
# IP address that the NIS server will listen to.
# Address 0.0.0.0 means handling all requests on the network.
NISPORT 3551
# The port number (3551 is the default value) on which to send
# data exchange with UPS.
EVENTSFILE /var/log/apcupsd.events
# A file in which all events are logged.
EVENTSFILEMAX 10
# Maximum log file size (in kilobytes).
# Older records are deleted if the specified value is exceeded.
# ===Configuration parameters for shared UPSs=====
#
UPSCLASS standalone
# UPSCLASS [ standalone | shareslave | sharemaster ]
UPSMODE disable
# UPSMODE [ disable | share ]
#
# ===== Configuration parameters for log files.
#
STATTIME 0
# Time interval between UPS status records.
# A value of 0 will block recording.
STATFILE /var/log/apcupsd.status
# STATUS file name (if STATTIME is not equal to 0).
LOGSTATS off
# LOGSTATS [ on | off ]
# Setting the variable to on produces a very large
# output volume.
DATATIME 0
# Time interval between log file entries.
# A value of 0 will block recording.
#FACILITY DAEMON
# FACILITY defines the service in the syslog file.
# Parameters for writing to non-volatile storage
# UPS memory.
# Parameters are only used by the apctest program for
# of modifications to settings in the UPS EEPROM.
UPSNAME UPS_3
# UPS Name. Maximum 8 characters.
BATTDATE 02/04/26
# Date of installation of new batteries.
#SENSITIVITY M
# SENSITIVITY H M L (default = H)
# Voltage measurement sensitivity.
WAKEUP 060
# WAKEUP 000 060 180 300 (default = 0)
# Delayed UPS turn-on when voltage is restored.
SLEEP 180
# SLEEP 020 180 300 600 (default = 20)
# Standby time before the UPS shuts down.
LOTRANSFER 208
# Minimum voltage to switch to batteries.
HITRANSFER 253
# Maximum voltage to switch to batteries.
#RETURNCHARGE 15
# RETURNCHARGE 00 15 50 90 (default = 15)
# Percentage of battery charge to be ready for operation.
#BEEPSTATE T
# BEEPSTATE 0 T L N (default = 0)
# Alarm Delay.
# 0 = zero delay, T = + 30 seconds, L = low level,
# N = never.
LOWBATT 02
# LOWBATT 02 05 07 10 (default = 02)
# Low level alarm delay
# of battery charge (in minutes).
OUTPUTVOLTS 230
# UPS output voltage during battery operation.
# Depends on the UPS model.
SELFTEST 336
# SELFTEST 336 168 ON OFF (default = 336)
# Interval (in hours) between UPS self-tests
# (336 = 2 weeks, 168 = 1 week, ON=on power up).

